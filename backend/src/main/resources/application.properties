spring.application.name=backend

## Postgres
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

## Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=ecos

## SQL
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

## Security
jwt.secret=${JWT_SECRET}
jwt.issuer=${JWT_ISSUER}
jwt.expire=${JWT_EXPIRE}
jwt.refresh.token.expiration=${JWT_REFRESH_EXPIRE}

web.cors.allowed-origins=${CORS_ALLOWED}

## Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

## Deployment
server.port=8080

## File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

## Email Configuration (Resend HTTPS API)
resend.api-key=${RESEND_APIKEY:}
resend.email=${RESEND_EMAIL:}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4173}

# Flyway Configuration
spring.flyway.schemas=ecos
spring.flyway.default-schema=ecos
spring.flyway.create-schemas=true
