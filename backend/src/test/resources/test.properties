spring.profiles.active=test

## h2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS ecos\\;SET SCHEMA ecos\\;CREATE DOMAIN IF NOT EXISTS TIMESTAMPTZ AS TIMESTAMP WITH TIME ZONE
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driverClassName=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

## Security
jwt.secret=secret
jwt.issuer=test
jwt.expire=5
jwt.refresh.token.expiration=30
web.cors.allowed-origins=http://localhost:3000

## Cloudinary
cloudinary.cloud-name=test-cloud
cloudinary.api-key=test-key
cloudinary.api-secret=test-secret

## Email Configuration
resend.api-key=test-key
resend.email=ecos@example.com
app.frontend-url=http://localhost:4173
